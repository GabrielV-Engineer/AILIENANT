[mypy]

# Flat-but-packaged layout: agents/, api/, brain/, etc. are sibling packages
# under this directory (the Python root — uvicorn/pytest run from here). Without
# explicit package bases, mypy flattens files to top-level module names and
# crashes on same-basename collisions (agents.orchestrator vs brain.orchestrator,
# api.audit vs core.audit, ...). These three settings resolve modules by their
# package path instead, so a whole-tree `mypy .` runs end-to-end.
mypy_path = .
explicit_package_bases = True
namespace_packages = True

# Never type-check the virtualenv itself. Without this, `mypy .` walks into
# venv/Scripts/*.py (pywin32 install helpers) and reports stub/annotation
# errors that have nothing to do with project code.
exclude = (?x)(^venv/ | /venv/ | ^\.venv/ | /node_modules/)

# Third-party libraries without stub packages
[mypy-psutil.*]
ignore_missing_imports = True

[mypy-yaml]
ignore_missing_imports = True

[mypy-pyarrow.*]
ignore_missing_imports = True

# Pre-existing strict-mode violations in files outside Phase 3.2 scope.
# follow_imports=silent: mypy follows the import (sees exported types) but
# does not report errors originating within those modules.
[mypy-core.compute_pool]
follow_imports = silent

[mypy-core.db]
follow_imports = silent

[mypy-api.websocket_manager]
follow_imports = silent

[mypy-brain.memory]
follow_imports = silent

[mypy-core.vfs_middleware]
follow_imports = silent

[mypy-tools.llm_gateway]
follow_imports = silent

[mypy-agents.analyst]
follow_imports = silent

# NOTE (Phase 7.12.8): the former `[mypy-agents.planner] follow_imports = silent`
# block was removed. The generic-type debt it deferred (bare list/dict on
# _inject_polyglot_constraints / run_planner_node / result) is now fixed, so
# planner.py passes `mypy --strict` directly — no suppression needed.

[mypy-shared.hardware]
follow_imports = silent

# Pre-existing unused-ignore in patch_tool.py:219 (LangChain @tool decorator
# stub mismatch). Surfaced when Phase 5.7 added the checkpoint-gate test that
# imports mutation_tools -> patch_tool. Out-of-scope fix: drop the stale
# `# type: ignore[misc]` once LangChain stubs catch up.
[mypy-tools.patch_tool]
follow_imports = silent
