[mypy]

# Third-party libraries without stub packages
[mypy-psutil.*]
ignore_missing_imports = True

# Pre-existing strict-mode violations in files outside Phase 3.2 scope.
# follow_imports=silent: mypy follows the import (sees exported types) but
# does not report errors originating within those modules.
[mypy-core.compute_pool]
follow_imports = silent

[mypy-core.db]
follow_imports = silent

[mypy-api.websocket_manager]
follow_imports = silent

[mypy-brain.memory]
follow_imports = silent

[mypy-core.vfs_middleware]
follow_imports = silent

[mypy-tools.llm_gateway]
follow_imports = silent

[mypy-agents.analyst]
follow_imports = silent

# Pre-existing strict-mode violations in planner.py (generic-type debt + flat-module
# `from prompts import ...`). Surfaced when 4.1.2 added planner.py to a mypy strict
# invocation. Out-of-scope fix: refactor to typed Dict[...] in a dedicated debt PR.
[mypy-agents.planner]
follow_imports = silent

[mypy-shared.hardware]
follow_imports = silent
